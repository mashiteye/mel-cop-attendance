.mode-btn{flex:1;padding:8px;border:2px solid #e5e5e5;border-radius:8px;background:#fff;color:#6B7280;font-weight:600;font-size:13px;cursor:pointer;font-family:Arial}
.mode-btn.active{border-color:#FF671B;background:#FFF0E6;color:#FF671B}
.day-btn{flex:1;padding:14px 10px;border:2px solid #e5e5e5;border-radius:10px;background:#fff;color:#1a1a1a;font-size:15px;font-weight:600;cursor:pointer;font-family:Arial;text-align:center}
.day-btn.active{border-color:#FF671B;background:#FFF0E6;color:#FF671B}
.found-card{background:#FFF0E6;border-radius:12px;padding:16px;margin-bottom:18px}
.found-id{font-size:11px;color:#FF671B;font-weight:600}
.found-name{font-size:20px;font-weight:700;color:#1a1a1a;margin-top:2px}

.result-item{padding:12px 14px;cursor:pointer;border-bottom:1px solid #f0f0f0}
.result-item:hover{background:#FFF0E6}
.result-item:last-child{border-bottom:none}
.result-name{font-weight:600;font-size:14px;color:#1a1a1a}
.result-meta{font-size:12px;color:#6B7280}
.sig-wrap{border:2px solid #ddd;border-radius:12px;overflow:hidden;position:relative;touch-action:none}
.sig-wrap.signed{border-color:#8DB92E}
.sig-hint{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#ccc;font-size:15px;pointer-events:none}
.back-btn{background:none;border:none;color:#fff;font-size:13px;cursor:pointer;padding:0}
.badge{display:inline-block;padding:5px 14px;border-radius:16px;font-size:13px;font-weight:600;margin-top:10px}

table{width:100%;border-collapse:collapse;font-size:12px}
th,td{padding:6px}
th{text-align:left;background:#f3f4f6}

// Signature pad
let sigCanvas,sigCtx,sigDrawing=false,sigSigned=false;
function initSig(){
  sigCanvas=document.querySelector("#sigPad canvas");
  if(!sigCanvas)return;
  const w=sigCanvas.parentElement.getBoundingClientRect().width;
  sigCanvas.width=w;sigCanvas.height=150;
  sigCtx=sigCanvas.getContext("2d");
  sigCtx.fillStyle="#fafafa";sigCtx.fillRect(0,0,w,150);
  sigCtx.strokeStyle="#1a1a1a";sigCtx.lineWidth=2.5;sigCtx.lineCap="round";
  sigDrawing=false;sigSigned=false;sig=null;
  const gp=e=>{const r=sigCanvas.getBoundingClientRect();const t=e.touches?e.touches[0]:e;return{x:t.clientX-r.left,y:t.clientY-r.top}};
  const sd=e=>{e.preventDefault();sigDrawing=true;const p=gp(e);sigCtx.beginPath();sigCtx.moveTo(p.x,p.y)};
  const mv=e=>{if(!sigDrawing)return;e.preventDefault();const p=gp(e);sigCtx.lineTo(p.x,p.y);sigCtx.stroke();sigSigned=true;
    sigCanvas.parentElement.style.borderColor="#8DB92E";const h=sigCanvas.parentElement.querySelector(".sig-hint");if(h)h.style.display="none"};
  const ed=()=>{sigDrawing=false;if(sigSigned)sig=sigCanvas.toDataURL()};
  sigCanvas.onmousedown=sd;sigCanvas.onmousemove=mv;sigCanvas.onmouseup=ed;sigCanvas.onmouseleave=ed;
  sigCanvas.ontouchstart=sd;sigCanvas.ontouchmove=mv;sigCanvas.ontouchend=ed;
}
function clearSig(){
  if(!sigCanvas)return;
  sigCtx.fillStyle="#fafafa";sigCtx.fillRect(0,0,sigCanvas.width,sigCanvas.height);
  sigSigned=false;sig=null;
  sigCanvas.parentElement.style.borderColor="#ddd";
  const h=sigCanvas.parentElement.querySelector(".sig-hint");if(h)h.style.display="block";
}

          <div class="flex gap10"><button class="day-btn ${day==="Day 1"?"active":""}" onclick="day='Day 1';render()"><div style="font-size:11px;opacity:.6">Select</div>Day 1</button><button class="day-btn ${day==="Day 2"?"active":""}" onclick="day='Day 2';render()"><div style="font-size:11px;opacity:.6">Select</div>Day 2</button></div></div>
        <div class="mb14"><label class="lbl">Sign to confirm attendance <span style="color:#DC2626">*</span></label>
          <div id="sigPad"><div class="sig-wrap"><canvas style="display:block;width:100%;cursor:crosshair"></canvas><div class="sig-hint">Sign here</div></div>
          <button onclick="clearSig()" style="margin-top:6px;padding:5px 14px;background:none;border:1px solid #ddd;border-radius:8px;font-size:12px;color:#6B7280;cursor:pointer">Clear</button></div></div>
        <div id="errMsg"></div>
        <button class="btn btn-orange" id="submitBtn" onclick="doSubmit()">Confirm Attendance</button>
      </div>`;
    setTimeout(initSig,50);
  }
  else if(screen==="walkin"){
    const flds=[{k:"name",l:"Full Name",req:1},{k:"sex",l:"Sex",t:"sel",req:1},{k:"org",l:"Organization",req:1},{k:"prog",l:"Program Name",req:1},{k:"pos",l:"Position",req:1},{k:"email",l:"Email",t:"email",req:1},{k:"phone",l:"Phone Number",t:"tel",req:1},{k:"melQ",l:"MEL Question",t:"ta",req:0}];
    app.innerHTML=`
      <div class="hdr"><button class="back-btn" onclick="screen='home';day='';sig=null;render()">&larr; Back</button><div style="font-size:18px;font-weight:700;margin-top:6px">New Participant</div></div>
      <div class="card">
        ${flds.map(f=>`<div class="mb12"><label class="lbl">${f.l} ${f.req?'<span style="color:#DC2626">*</span>':""}</label>
          ${f.t==="sel"?`<div class="flex gap8"><button class="day-btn" id="sexM" onclick="document.getElementById('sexM').classList.add('active');document.getElementById('sexF').classList.remove('active')">Male</button><button class="day-btn" id="sexF" onclick="document.getElementById('sexF').classList.add('active');document.getElementById('sexM').classList.remove('active')">Female</button></div>`
          :f.t==="ta"?`<textarea class="inp" id="wi_${f.k}" style="min-height:70px;resize:vertical"></textarea>`
          :`<input class="inp" type="${f.t||"text"}" id="wi_${f.k}">`}</div>`).join("")}
        <div class="mb12"><label class="lbl">Day <span style="color:#DC2626">*</span></label>
          <div class="flex gap8"><button class="day-btn ${day==="Day 1"?"active":""}" id="wd1" onclick="day='Day 1';document.getElementById('wd1').classList.add('active');document.getElementById('wd2').classList.remove('active')">Day 1</button><button class="day-btn ${day==="Day 2"?"active":""}" id="wd2" onclick="day='Day 2';document.getElementById('wd2').classList.add('active');document.getElementById('wd1').classList.remove('active')">Day 2</button></div></div>
        <div class="mb12"><label class="lbl">Signature <span style="color:#DC2626">*</span></label>
          <div id="sigPad"><div class="sig-wrap"><canvas style="display:block;width:100%;cursor:crosshair"></canvas><div class="sig-hint">Sign here</div></div>
          <button onclick="clearSig()" style="margin-top:6px;padding:5px 14px;background:none;border:1px solid #ddd;border-radius:8px;font-size:12px;color:#6B7280;cursor:pointer">Clear</button></div></div>
        <div id="errMsg"></div>
        <button class="btn btn-orange" id="submitBtn" onclick="doWalkinSubmit()">Submit & Sign</button>
      </div>`;
    setTimeout(initSig,50);
  }
  else if(screen==="success"){
    const last=subs[subs.length-1];
    app.innerHTML=`
      <div class="hdr" style="background:#8DB92E"><div style="font-size:20px;font-weight:700">Attendance Confirmed</div><div style="font-size:12px;opacity:.8;margin-top:4px">Saved to Google Sheets</div></div>
      <div class="card"><div class="tcenter" style="margin-bottom:20px">
        <div class="success-circle">&#10003;</div>
        <div style="font-size:20px;font-weight:700;color:#1a1a1a">${last.name}</div>
        <div style="font-size:14px;color:#6B7280">${last.org}</div>
        <div class="badge" style="background:${last.day==="Day 1"?"#FFF0E6":"#E0F7FA"};color:${last.day==="Day 1"?"#FF671B":"#4FCDB0"}">${last.day} Signed &#10003;</div>
      </div>
      <button class="btn btn-orange" onclick="screen='home';found=null;day='';sig=null;mode='code';render()">Next Participant</button></div>`;
  }
}

function showErr(msg){const e=$("errMsg");if(e)e.innerHTML=msg?`<div class="err">${msg}</div>`:""}

function doLookup(){
  const v=($("codeInp")||{}).value||"";
  const t=v.trim().toUpperCase();
  if(!t){showErr("Enter a code");return}
  const num=parseInt(t.replace(/\D/g,""),10);
  const m=P.find(p=>parseInt(p.id.replace(/\D/g,""),10)===num);
  if(m){found=m;screen="confirm";day="";sig=null;render()}
  else showErr('Code "'+t+'" not found. Try name search.');
}

function doSearch(){
  const v=($("searchInp")||{}).value||"";
  const t=v.trim().toLowerCase();
  if(t.length<2){showErr("Type at least 2 characters");return}
  const r=P.filter(p=>p.name.toLowerCase().includes(t)||p.org.toLowerCase().includes(t));
  const rd=$("results");
  if(!r.length){showErr("No match. Try different spelling or register as walk-in.");if(rd)rd.innerHTML="";return}
  showErr("");
  if(rd)rd.innerHTML=`<div style="max-height:250px;overflow-y:auto;border:1px solid #e5e5e5;border-radius:10px">${r.map((p,i)=>`<div class="result-item" onclick="found=P[${P.indexOf(p)}];screen='confirm';day='';sig=null;render()"><div class="result-name">${p.name}</div><div class="result-meta">${p.id} · ${p.org}</div></div>`).join("")}</div>`;
}

async function doSubmit(){
  if(!day){showErr("Select the day");return}
  if(!sig){showErr("Please sign");return}
  if(subs.some(s=>s.name.toLowerCase()===found.name.toLowerCase()&&s.day===day)){showErr(found.name+" already signed for "+day);return}
  const b=$("submitBtn");if(b){b.textContent="Saving...";b.disabled=true}
  const entry={pid:found.id,name:found.name,org:found.org,sex:found.sex,prog:found.prog,pos:found.pos,email:found.email,phone:found.phone,day,type:"registered",time:new Date().toLocaleString("en-GB",{timeZone:"Africa/Accra"})};
  await sendToSheet(entry);
  subs.push(entry);saveSubs();screen="success";render();
}

async function doWalkinSubmit(){
  const g=id=>($(id)||{}).value||"";
  const sex=$("sexM")&&$("sexM").classList.contains("active")?"Male":$("sexF")&&$("sexF").classList.contains("active")?"Female":"";
  const w={name:g("wi_name"),sex,org:g("wi_org"),prog:g("wi_prog"),pos:g("wi_pos"),email:g("wi_email"),phone:g("wi_phone"),melQ:g("wi_melQ")};
  if(!w.name||!w.sex||!w.org||!w.prog||!w.pos||!w.email||!w.phone){showErr("Fill all required fields");return}
  if(!day){showErr("Select the day");return}
  if(!sig){showErr("Please sign");return}
  if(subs.some(s=>s.name.toLowerCase()===w.name.toLowerCase()&&s.day===day)){showErr(w.name+" already signed for "+day);return}
  const b=$("submitBtn");if(b){b.textContent="Saving...";b.disabled=true}
  const entry={pid:"W-"+String(subs.filter(s=>s.pid.startsWith("W-")).length+1).padStart(3,"0"),name:w.name,org:w.org,sex:w.sex,prog:w.prog,pos:w.pos,email:w.email,phone:w.phone,day,type:"walk-in",time:new Date().toLocaleString("en-GB",{timeZone:"Africa/Accra"})};
  await sendToSheet(entry);
  subs.push(entry);saveSubs();screen="success";render();
}

function doExport(){
  if(!subs.length)return;
  const k=["pid","name","org","sex","prog","pos","email","phone","day","time","type"];
  const csv=[k.join(","),...subs.map(s=>k.map(c=>'"'+(s[c]||"").replace(/"/g,'""')+'"').join(","))].join("\n");
  const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));
  a.download="mel_cop_attendance_"+new Date().toISOString().split("T")[0]+".csv";a.click();
}

render();
</script>
</body>
</html>
